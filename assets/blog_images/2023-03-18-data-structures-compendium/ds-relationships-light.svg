<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="780" height="460" fill="#ffffff" rx="8"/>

  <!-- Category: Linear -->
  <rect x="20" y="20" width="230" height="250" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="135" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#4338ca">Linear</text>

  <rect x="40" y="65" width="190" height="36" rx="6" fill="#ffffff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="135" y="88" text-anchor="middle" font-size="13" fill="#312e81">Arrays</text>

  <rect x="40" y="111" width="190" height="36" rx="6" fill="#ffffff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="135" y="134" text-anchor="middle" font-size="13" fill="#312e81">Linked Lists</text>

  <rect x="40" y="157" width="190" height="36" rx="6" fill="#ffffff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="135" y="180" text-anchor="middle" font-size="13" fill="#312e81">Stacks &amp; Queues</text>

  <rect x="40" y="203" width="190" height="36" rx="6" fill="#ffffff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="135" y="226" text-anchor="middle" font-size="13" fill="#312e81">Strings</text>

  <!-- Category: Associative -->
  <rect x="275" y="20" width="230" height="250" rx="10" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5"/>
  <text x="390" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Associative</text>

  <rect x="295" y="65" width="190" height="36" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
  <text x="390" y="88" text-anchor="middle" font-size="13" fill="#064e3b">Hash Tables</text>

  <rect x="295" y="111" width="190" height="36" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
  <text x="390" y="134" text-anchor="middle" font-size="13" fill="#064e3b">Heaps</text>

  <rect x="295" y="157" width="190" height="36" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="1"/>
  <text x="390" y="180" text-anchor="middle" font-size="13" fill="#064e3b">Sets</text>

  <!-- Category: Non-Linear -->
  <rect x="530" y="20" width="230" height="250" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="645" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#c2410c">Non-Linear</text>

  <rect x="550" y="65" width="190" height="36" rx="6" fill="#ffffff" stroke="#fdba74" stroke-width="1"/>
  <text x="645" y="88" text-anchor="middle" font-size="13" fill="#7c2d12">Trees</text>

  <rect x="550" y="111" width="190" height="36" rx="6" fill="#ffffff" stroke="#fdba74" stroke-width="1"/>
  <text x="645" y="134" text-anchor="middle" font-size="13" fill="#7c2d12">Graphs</text>

  <rect x="550" y="157" width="190" height="36" rx="6" fill="#ffffff" stroke="#fdba74" stroke-width="1"/>
  <text x="645" y="180" text-anchor="middle" font-size="13" fill="#7c2d12">Tries</text>

  <!-- Relationship arrows -->
  <defs>
    <marker id="arrow-light" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#6b7280" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Arrays -> Hash Tables (backing array) -->
  <line x1="230" y1="83" x2="293" y2="83" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-light)"/>

  <!-- Arrays -> Stacks & Queues (can implement) -->
  <path d="M135,101 L135,155" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-light)"/>

  <!-- Linked Lists -> Stacks & Queues (can implement) -->
  <path d="M135,147 L135,155" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-light)"/>

  <!-- Trees -> Heaps (heaps are trees) -->
  <line x1="550" y1="83" x2="487" y2="120" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-light)"/>

  <!-- Trees -> Tries (tries are trees) -->
  <path d="M645,101 L645,155" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-light)"/>

  <!-- Hash Tables -> Sets (HashSet) -->
  <path d="M390,101 L390,155" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-light)"/>

  <!-- Trees -> Sets (TreeSet) -->
  <line x1="550" y1="89" x2="487" y2="168" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-light)"/>

  <!-- Legend -->
  <rect x="20" y="290" width="740" height="150" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="40" y="318" font-size="13" font-weight="700" fill="#374151">Relationships</text>

  <line x1="40" y1="340" x2="90" y2="340" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-light)"/>
  <text x="100" y="344" font-size="12" fill="#4b5563">implements / builds on</text>

  <text x="40" y="375" font-size="12" fill="#4b5563">Arrays back Hash Tables internally. Stacks and Queues can be built on Arrays or Linked Lists.</text>
  <text x="40" y="395" font-size="12" fill="#4b5563">Heaps are specialized Trees stored in arrays. Tries are tree structures optimized for string prefixes.</text>
  <text x="40" y="415" font-size="12" fill="#4b5563">Sets are backed by Hash Tables (HashSet, O(1)) or Trees (TreeSet, O(log n), sorted).</text>
  <text x="40" y="435" font-size="12" fill="#4b5563">Trees are a restricted form of Graphs (connected, acyclic).</text>
</svg>