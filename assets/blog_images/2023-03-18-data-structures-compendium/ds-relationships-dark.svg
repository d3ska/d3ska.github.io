<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="780" height="460" fill="#1b1b1e" rx="8"/>

  <!-- Category: Linear -->
  <rect x="20" y="20" width="230" height="250" rx="10" fill="#1e1b4b" stroke="#3730a3" stroke-width="1.5"/>
  <text x="135" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#a5b4fc">Linear</text>

  <rect x="40" y="65" width="190" height="36" rx="6" fill="#272742" stroke="#4338ca" stroke-width="1"/>
  <text x="135" y="88" text-anchor="middle" font-size="13" fill="#c7d2fe">Arrays</text>

  <rect x="40" y="111" width="190" height="36" rx="6" fill="#272742" stroke="#4338ca" stroke-width="1"/>
  <text x="135" y="134" text-anchor="middle" font-size="13" fill="#c7d2fe">Linked Lists</text>

  <rect x="40" y="157" width="190" height="36" rx="6" fill="#272742" stroke="#4338ca" stroke-width="1"/>
  <text x="135" y="180" text-anchor="middle" font-size="13" fill="#c7d2fe">Stacks &amp; Queues</text>

  <rect x="40" y="203" width="190" height="36" rx="6" fill="#272742" stroke="#4338ca" stroke-width="1"/>
  <text x="135" y="226" text-anchor="middle" font-size="13" fill="#c7d2fe">Strings</text>

  <!-- Category: Associative -->
  <rect x="275" y="20" width="230" height="250" rx="10" fill="#022c22" stroke="#047857" stroke-width="1.5"/>
  <text x="390" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#6ee7b7">Associative</text>

  <rect x="295" y="65" width="190" height="36" rx="6" fill="#0a3d2e" stroke="#059669" stroke-width="1"/>
  <text x="390" y="88" text-anchor="middle" font-size="13" fill="#a7f3d0">Hash Tables</text>

  <rect x="295" y="111" width="190" height="36" rx="6" fill="#0a3d2e" stroke="#059669" stroke-width="1"/>
  <text x="390" y="134" text-anchor="middle" font-size="13" fill="#a7f3d0">Heaps</text>

  <rect x="295" y="157" width="190" height="36" rx="6" fill="#0a3d2e" stroke="#059669" stroke-width="1"/>
  <text x="390" y="180" text-anchor="middle" font-size="13" fill="#a7f3d0">Sets</text>

  <!-- Category: Non-Linear -->
  <rect x="530" y="20" width="230" height="250" rx="10" fill="#431407" stroke="#c2410c" stroke-width="1.5"/>
  <text x="645" y="48" text-anchor="middle" font-size="14" font-weight="700" fill="#fdba74">Non-Linear</text>

  <rect x="550" y="65" width="190" height="36" rx="6" fill="#4a1d0a" stroke="#ea580c" stroke-width="1"/>
  <text x="645" y="88" text-anchor="middle" font-size="13" fill="#fed7aa">Trees</text>

  <rect x="550" y="111" width="190" height="36" rx="6" fill="#4a1d0a" stroke="#ea580c" stroke-width="1"/>
  <text x="645" y="134" text-anchor="middle" font-size="13" fill="#fed7aa">Graphs</text>

  <rect x="550" y="157" width="190" height="36" rx="6" fill="#4a1d0a" stroke="#ea580c" stroke-width="1"/>
  <text x="645" y="180" text-anchor="middle" font-size="13" fill="#fed7aa">Tries</text>

  <!-- Relationship arrows -->
  <defs>
    <marker id="arrow-dark" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#9ca3af" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Arrays -> Hash Tables (backing array) -->
  <line x1="230" y1="83" x2="293" y2="83" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-dark)"/>

  <!-- Arrays -> Stacks & Queues (can implement) -->
  <path d="M135,101 L135,155" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-dark)"/>

  <!-- Linked Lists -> Stacks & Queues (can implement) -->
  <path d="M135,147 L135,155" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-dark)"/>

  <!-- Trees -> Heaps (heaps are trees) -->
  <line x1="550" y1="83" x2="487" y2="120" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-dark)"/>

  <!-- Trees -> Tries (tries are trees) -->
  <path d="M645,101 L645,155" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-dark)"/>

  <!-- Hash Tables -> Sets (HashSet) -->
  <path d="M390,101 L390,155" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-dark)"/>

  <!-- Trees -> Sets (TreeSet) -->
  <line x1="550" y1="89" x2="487" y2="168" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-dark)"/>

  <!-- Legend -->
  <rect x="20" y="290" width="740" height="150" rx="10" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="40" y="318" font-size="13" font-weight="700" fill="#e5e7eb">Relationships</text>

  <line x1="40" y1="340" x2="90" y2="340" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-dark)"/>
  <text x="100" y="344" font-size="12" fill="#d1d5db">implements / builds on</text>

  <text x="40" y="375" font-size="12" fill="#d1d5db">Arrays back Hash Tables internally. Stacks and Queues can be built on Arrays or Linked Lists.</text>
  <text x="40" y="395" font-size="12" fill="#d1d5db">Heaps are specialized Trees stored in arrays. Tries are tree structures optimized for string prefixes.</text>
  <text x="40" y="415" font-size="12" fill="#d1d5db">Sets are backed by Hash Tables (HashSet, O(1)) or Trees (TreeSet, O(log n), sorted).</text>
  <text x="40" y="435" font-size="12" fill="#d1d5db">Trees are a restricted form of Graphs (connected, acyclic).</text>
</svg>